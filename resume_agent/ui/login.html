<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Karmic Intelligence Platform</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="/ui/app.css" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 50%, rgba(25, 135, 84, 0.05), transparent 60%),
                    var(--bg-color, #f8f9fa);
        font-family: "Outfit", sans-serif;
      }
      .auth-container {
        width: 100%;
        max-width: 480px;
        padding: 2rem;
      }
      .auth-card {
        background: var(--surface, #ffffff);
        border-radius: 1.5rem;
        box-shadow: 0 1rem 3rem rgba(0,0,0,0.08);
        border: 1px solid rgba(0,0,0,0.05);
        padding: 2.5rem;
        position: relative;
        overflow: hidden;
      }
      .auth-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--primary, #0d6efd), var(--success, #198754));
      }
      .nav-pills .nav-link {
        color: var(--text-color, #212529);
        border-radius: 0.75rem;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .nav-pills .nav-link.active {
        background: var(--primary, #0d6efd) !important;
        color: white;
        box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);
      }
      .form-control {
        border-radius: 0.75rem;
        padding: 0.8rem 1.25rem;
        border: 1px solid rgba(0,0,0,0.1);
        background: var(--input-bg, #f8f9fa);
        transition: all 0.3s ease;
      }
      .form-control:focus {
        background: var(--surface, #ffffff);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
      }
      .btn-primary {
        border-radius: 0.75rem;
        padding: 0.8rem 1.5rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
      }
      .logo-icon {
        width: 64px;
        height: 64px;
        background: rgba(13, 110, 253, 0.1);
        color: var(--primary, #0d6efd);
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin: 0 auto 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="auth-container animate__animated animate__fadeInUp">
      <div class="auth-card">
        <div class="text-center mb-4">
          <div class="logo-icon animate__animated animate__pulse animate__infinite">
            <i class="bi bi-robot"></i>
          </div>
          <h2 class="fw-bold mb-1">Karmic Platform</h2>
          <p class="text-muted">Sign in to access intelligence</p>
        </div>

        <ul class="nav nav-pills nav-fill gap-2 mb-4" id="authTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login" type="button" role="tab">Login</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register" type="button" role="tab">Register</button>
          </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
          <!-- Login Form -->
          <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label fw-medium text-muted small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                  <input type="email" class="form-control border-start-0 ps-0" id="loginEmail" placeholder="name@company.com" required>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-medium text-muted small">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input type="password" class="form-control border-start-0 ps-0" id="loginPassword" placeholder="••••••••" required>
                </div>
              </div>
              <div id="loginAlert" class="alert alert-danger d-none small py-2 mb-3"></div>
              <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                <span class="btn-text">Sign In <i class="bi bi-arrow-right ms-2"></i></span>
                <span class="spinner-border spinner-border-sm d-none" role="status"></span>
              </button>
            </form>
          </div>

          <!-- Register Form -->
          <div class="tab-pane fade" id="register" role="tabpanel">
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label fw-medium text-muted small">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person text-muted"></i></span>
                  <input type="text" class="form-control border-start-0 ps-0" id="registerName" placeholder="John Doe" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium text-muted small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                  <input type="email" class="form-control border-start-0 ps-0" id="registerEmail" placeholder="name@company.com" required>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-medium text-muted small">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input type="password" class="form-control border-start-0 ps-0" id="registerPassword" placeholder="••••••••" required minlength="6">
                </div>
              </div>
              <div id="registerAlert" class="alert py-2 small mb-3 d-none"></div>
              <button type="submit" class="btn btn-primary w-100" id="registerBtn">
                <span class="btn-text">Create Account <i class="bi bi-person-plus ms-2"></i></span>
                <span class="spinner-border spinner-border-sm d-none" role="status"></span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const loginAlert = document.getElementById('loginAlert');
      const registerAlert = document.getElementById('registerAlert');

      function setLoading(btnId, isLoading) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
          btn.disabled = true;
          btn.querySelector('.btn-text').classList.add('d-none');
          btn.querySelector('.spinner-border').classList.remove('d-none');
        } else {
          btn.disabled = false;
          btn.querySelector('.btn-text').classList.remove('d-none');
          btn.querySelector('.spinner-border').classList.add('d-none');
        }
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginAlert.classList.add('d-none');
        setLoading('loginBtn', true);
        
        try {
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('loginEmail').value,
              password: document.getElementById('loginPassword').value
            })
          });
          const data = await res.json();
          if (res.ok) {
            window.location.href = '/';
          } else {
            loginAlert.textContent = data.detail || 'Login failed';
            loginAlert.classList.remove('d-none');
          }
        } catch (err) {
          loginAlert.textContent = 'Network error. Please try again.';
          loginAlert.classList.remove('d-none');
        } finally {
          setLoading('loginBtn', false);
        }
      });

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        registerAlert.classList.add('d-none');
        registerAlert.classList.remove('alert-danger', 'alert-success');
        setLoading('registerBtn', true);
        
        try {
          const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: document.getElementById('registerName').value,
              email: document.getElementById('registerEmail').value,
              password: document.getElementById('registerPassword').value
            })
          });
          const data = await res.json();
          if (res.ok) {
            registerAlert.textContent = 'Registration successful! You can now login.';
            registerAlert.classList.add('alert-success');
            registerAlert.classList.remove('d-none');
            registerForm.reset();
            // Switch to login tab after 2s
            setTimeout(() => {
              const loginTab = new bootstrap.Tab(document.getElementById('login-tab'));
              loginTab.show();
            }, 2000);
          } else {
            registerAlert.textContent = data.detail || 'Registration failed';
            registerAlert.classList.add('alert-danger');
            registerAlert.classList.remove('d-none');
          }
        } catch (err) {
          registerAlert.textContent = 'Network error. Please try again.';
          registerAlert.classList.add('alert-danger');
          registerAlert.classList.remove('d-none');
        } finally {
          setLoading('registerBtn', false);
        }
      });
    </script>
  </body>
</html>
